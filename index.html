<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="HandheldFriendly" content="true">
    <link href='https://unpkg.com/css.gg@2.0.0/icons/css/dark-mode.css' rel='stylesheet'>
    <title>Calculator</title>
</head>
<body>

    <div class="calculator">
        <!-------- Displayfeld ------>
        <div class="display">
            <input type="text" placeholder=".." id="input" disabled>
        </div>
        <p>CALC</p>

        <div class="buttons">
        <!-------- Alles löschen ------>
        <input type="button" value="CA" id="clear" style="background-color: #FF6B00;"  />
        <!-------- Letzte Zahl löschen ------->
        <input type="button" value="C" id="erase" style="background-color: #FF6B00;" />
        <!-------- Andere Funktionen ------>
        <input type="button" value=""  class="input-button" style="background-color: #FF6B00;"  disabled />
        <input type="button" value="/" class="input-button" id="outer"  style="background-color: #FF6B00;" />
        <input type="button" value="1" class="input-button" />
        <input type="button" value="2" class="input-button" />
        <input type="button" value="3" class="input-button" />
        <input type="button" value="*" class="input-button" id="outer" style="background-color: #FF6B00;" />
        <input type="button" value="4" class="input-button" />
        <input type="button" value="5" class="input-button" />
        <input type="button" value="6" class="input-button" />
        <input type="button" value="-" class="input-button" id="outer" style="background-color: #FF6B00;" />
        <input type="button" value="7" class="input-button" />
        <input type="button" value="8" class="input-button" />
        <input type="button" value="9" class="input-button" />
        <input type="button" value="+" class="input-button" id="plus" style="background-color: #FF6B00;" />
        <input type="button" value="0" class="input-button" />
        <input type="button" value="." class="input-button" /> 
        <input type="button" value="=" id="equal" style="background-color: #F71466" />
        </div> 
    </div>
        <script src="main.js"></script>
</body>
</html>
